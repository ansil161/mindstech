version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: mindstec-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindstec-ai-service
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./config:/app/config
    env_file:
      - .env
    depends_on:
      - qdrant
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  qdrant_data:
