<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Mindstec Distribution</title>
<meta name="description" content="The page you're looking for doesn't exist. Head back to Mindstec Distribution.">
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="mindstec-logo-web.png">
<meta name="theme-color" content="#0C0C0C">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --red:#CC0001;--ink:#0C0C0C;--white:#FAFAFA;--grey:#9A9A9A;
  --line:rgba(255,255,255,.12);--line-soft:rgba(255,255,255,.07);
  --display:'Archivo',sans-serif;--body:'Inter',sans-serif;
  --ease:cubic-bezier(.22,1,.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--ink);color:var(--white);font-family:var(--body);
  min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:24px;text-align:center;-webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none;cursor:pointer}
::selection{background:var(--red);color:#fff}
:focus-visible{outline:2px solid var(--red);outline-offset:3px}
.logo img{height:44px;width:auto;margin-bottom:36px}
.code{
  font-family:var(--display);font-weight:700;letter-spacing:-.04em;line-height:.9;
  font-size:clamp(96px,22vw,240px);
}
.code em{font-style:normal;color:var(--red)}
h1{
  font-family:var(--display);font-weight:600;letter-spacing:-.02em;
  font-size:clamp(20px,3vw,30px);margin-top:18px;
}
p{color:var(--grey);font-size:15px;line-height:1.7;max-width:46ch;margin-top:10px}
.actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:36px}
.btn{
  position:relative;display:inline-flex;align-items:center;gap:12px;
  font-size:14px;font-weight:500;letter-spacing:.02em;
  padding:16px 28px;min-height:48px;border:1px solid var(--line);
  border-radius:2px;overflow:hidden;transition:color .3s var(--ease),border-color .3s var(--ease);
  background:transparent;color:var(--white);
}
.btn::before{
  content:'';position:absolute;inset:0;background:var(--red);
  transform:scaleY(0);transform-origin:bottom;transition:transform .35s var(--ease);z-index:0;
}
.btn:hover::before{transform:scaleY(1)}
.btn:hover{border-color:var(--red);color:#fff}
.btn > *{position:relative;z-index:1}
.btn--solid{background:var(--red);border-color:var(--red)}
.btn--solid::before{background:#fff}
.btn--solid:hover{color:var(--ink)}
</style>
</head>
<body>
<a class="logo" href="index.html" aria-label="Mindstec home"><img src="mindstec-logo-web.png" alt="Mindstec — Technology of the Future, Today"></a>
<div class="code" aria-hidden="true">4<em>0</em>4</div>
<h1>This page isn't on the floor.</h1>
<p>The address may have changed, or it never existed. Everything we distribute is one click away.</p>
<div class="actions">
  <a class="btn btn--solid" href="index.html"><span>Back to home</span></a>
  <a class="btn" href="solutions.html"><span>Browse solutions</span></a>
  <a class="btn" href="contact.html"><span>Contact us</span></a>
</div>
</body>
</html>
