version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mindstec-postgres
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mindstec-network

  redis:
    image: redis:7-alpine
    container_name: mindstec-redis
    restart: unless-stopped
    networks:
      - mindstec-network

  qdrant:
    image: qdrant/qdrant:v1.10.0
    container_name: mindstec-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - mindstec-network

  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: mindstec-ai-service
    volumes:
      - ./ai_service/app:/app/app
      - ./ai_service/config:/app/config
    env_file:
      - ./ai_service/.env
    depends_on:
      - qdrant
    restart: unless-stopped
    networks:
      - mindstec-network

  django-backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mindstec-django-backend
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - media_data:/app/mindstech/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - mindstec-network

  celery-worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mindstec-celery-worker
    command: celery -A mindstech worker --loglevel=info
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - media_data:/app/mindstech/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - mindstec-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: mindstec-nginx-proxy
    ports:
      - "80:80"
    volumes:
      - media_data:/app/media:ro
    depends_on:
      - django-backend
      - ai-service
    restart: unless-stopped
    networks:
      - mindstec-network

volumes:
  postgres_data:
  qdrant_data:
  media_data:

networks:
  mindstec-network:
    name: mindstec-network
