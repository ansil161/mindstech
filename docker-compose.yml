version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: mindstec-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.10.0
    container_name: mindstec-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: mindstec-ai-service
    ports:
      - "8001:8000"
    volumes:
      - ./ai_service/app:/app/app
      - ./ai_service/config:/app/config
    env_file:
      - ./ai_service/.env
    depends_on:
      - qdrant
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  celery-worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mindstec-celery-worker
    command: celery -A mindstech worker --loglevel=info
    volumes:
      - ./server:/app
    environment:
      - DB_NAME=mindstech_db
      - DB_USER=postgres
      - DB_PASSWORD=12345
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai-service:8000
      - SECRET_KEY=django-insecure-f0+&44u=h^*t4&yw*oqa_l3(hffg7ed9@4pk5!=h9&)ndn=ds5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - ai-service
    restart: unless-stopped

volumes:
  qdrant_data:
